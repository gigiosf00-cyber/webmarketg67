        .card-content { padding: 14px; }
        .card-header { font-size:11px; font-weight:800; color:#94a3b8; margin-bottom:4px; }

        .title { font-size:14px; font-weight:700; margin-bottom:12px; height: 34px; overflow: hidden; }

        .btn { flex:1; text-align:center; padding:11px; border-radius:10px; text-decoration:none; font-weight:700; font-size:13px; }
