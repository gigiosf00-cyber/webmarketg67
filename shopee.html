<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMARKETG67 | Vitrine Shopee</title>
    <!-- Ícones Modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonte Google Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff5722;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shopee: #ee4d2d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Voltar */
        .btn-voltar {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: left;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .logo span { color: var(--primary); }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* Buscador Interno da Shopee */
        .search-container {
            display: flex;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 25px;
        }
        .search-container input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            font-weight: 700;
            padding: 10px;
            text-transform: uppercase;
        }
        .btn-search {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Vitrine de Cards */
        .vitrine-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }

        .product-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
        }

        .product-code-discreet {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }
        .product-code-discreet span { color: var(--primary); font-weight: 800; }

        .product-image-wrapper {
            width: 100%;
            height: 260px;
            background: #f1f5f9;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-details { padding: 14px; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }

        .btn-buy {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--shopee);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar para Início</a>

    <div class="logo"><i class="fab fa-shopee text-primary"></i> Achadinhos <span>Shopee</span></div>
    <div class="subtitle">Use o buscador ou clique no produto abaixo</div>

    <!-- Buscador Exclusivo Shopee -->
    <div class="search-container">
        <input type="text" id="inputCodigo" placeholder="Digite o código (Ex: S46...)">
        <button class="btn-search" onclick="buscarAcao()">Buscar</button>
    </div>

    <div id="msgSucesso" style="display:none; color:#16a34a; font-weight:600; margin-bottom:15px;">Redirecionando...</div>
    <div id="msgErro" style="display:none; color:#dc2626; font-weight:600; margin-bottom:15px;">Código não encontrado!</div>

    <!-- Lista com Códigos Visíveis no Topo -->
    <div class="vitrine-grid">
        
        <!-- ITEM S46 -->
        <div class="product-card">
            <div class="product-header-bar">
                <div class="product-code-discreet">CÓDIGO: <span>#S46</span></div>
                <small style="color: #94a3b8;">Moda</small>
            </div>
            <div class="product-image-wrapper">
                <img class="product-image" src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500" alt="Produto">
            </div>
            <div class="product-details">
                <h3 class="product-title">Calça Wide Leg Pantalona</h3>
                <a href="https://s.shopee.com.br/70HpDRKLTD" target="_blank" class="btn-buy">
                    <i class="fas fa-shopping-cart"></i> Pegar Produto
                </a>
            </div>
        </div>

        <!-- ITEM S47 -->
        <div class="product-card">
            <div class="product-header-bar">
                <div class="product-code-discreet">CÓDIGO: <span>#S47</span></div>
                <small style="color: #94a3b8;">Decoração</small>
            </div>
            <div class="product-image-wrapper">
                <img class="product-image" src="https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=500" alt="Produto">
            </div>
            <div class="product-details">
                <h3 class="product-title">Kit Capas para Almofadas</h3>
                <a href="https://s.shopee.com.br/9fIaQg9Mq8" target="_blank" class="btn-buy">
                    <i class="fas fa-shopping-cart"></i> Pegar Produto
                </a>
            </div>
        </div>

    </div>
</div>

<script>
    const linksProdutos = {
        "S46": "https://s.shopee.com.br/70HpDRKLTD",
        "S47": "https://s.shopee.com.br/9fIaQg9Mq8"
    };

    function buscarAcao() {
        const valorInput = document.getElementById('inputCodigo').value.trim().toUpperCase();
        const msgErro = document.getElementById('msgErro');
        const msgSucesso = document.getElementById('msgSucesso');

        if (linksProdutos[valorInput]) {
            msgErro.style.display = "none";
            msgSucesso.style.display = "block";
            setTimeout(function() {
                window.open(linksProdutos[valorInput], '_blank');
            }, 600);
        } else {
            msgSucesso.style.display = "none";
            msgErro.style.display = "block";
        }
    }
</script>
</body>
</html>
