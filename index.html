<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMARKETG67 | Central de Achadinhos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 35px 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .logo { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .logo span { color: #ff5722; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }

        .market-buttons { display: flex; flex-direction: column; gap: 16px; }

        .btn-market {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            color: white;
            transition: transform 0.2s;
        }
        .btn-market:hover { transform: scale(1.02); }

        .shopee { background: #ee4d2d; }
        .mercado-livre { background: #fff159; color: #333; }
        .amazon { background: #232f3e; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fas fa-shopping-bag"></i> WEBMARKET<span>G67</span></div>
    <div class="subtitle">Escolha uma plataforma para ver os achadinhos:</div>

    <div class="market-buttons">
        <!-- Direciona para a página interna criada -->
        <a href="shopee.html" class="btn-market shopee">
            <span><i class="fab fa-shopee"></i> Vitrine Shopee</span>
            <i class="fas fa-chevron-right"></i>
        </a>

        <!-- Futuras plataformas (Exemplos) -->
        <a href="#" class="btn-market mercado-livre">
            <span><i class="fas fa-store"></i> Mercado Livre (Breve)</span>
            <i class="fas fa-chevron-right"></i>
        </a>

        <a href="#" class="btn-market amazon">
            <span><i class="fab fa-amazon"></i> Amazon (Breve)</span>
            <i class="fas fa-chevron-right"></i>
        </a>
    </div>
</div>

</body>
</html>
