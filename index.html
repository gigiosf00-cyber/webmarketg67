        body { background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:15px; }

        .logo span { color:var(--primary); }
        .subtitle { font-size:13px; color:#64748b; margin-bottom:24px; }
        .search-box { background:#f1f5f9; border:2px solid #e2e8f0; border-radius:18px; padding:18px; margin-bottom:24px; }
        .search-box p { font-size:13px; font-weight:700; margin-bottom:10px; }
        .search-box input { width:100%; padding:12px; border-radius:12px; border:1px solid #cbd5e1; outline:none; text-align:center; font-weight:800; font-size:20px; text-transform:uppercase; letter-spacing:2px; color: var(--primary); }
        .btn-search { width:100%; background:var(--primary); color:#fff; border:none; padding:14px; border-radius:12px; margin-top:10px; font-weight:800; font-size:15px; cursor:pointer; }
        #msgErro { display:none; color:#dc2626; font-weight:700; margin-top:8px; font-size:13px; }
        .divider { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
        .divider hr { flex:1; border:none; border-top:1px solid #e2e8f0; }
        .divider span { font-size:12px; color:#94a3b8; font-weight:600; white-space:nowrap; }
        .market-buttons { display:flex; flex-direction:column; gap:12px; }
        .btn-market { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-radius:14px; text-decoration:none; font-weight:700; font-size:15px; color:white; }
        .shopee { background:#ee4d2d; }
        .mercado-livre { background:#fff159; color:#333; }
        .amazon { background:#232f3e; }
        .badge { font-size:10px; background:rgba(255,255,255,0.25); padding:3px 8px; border-radius:20px; font-weight:600; }
        .badge-dark { background:rgba(0,0,0,0.2); }
    </style>
</head>

    function buscar() {

    // Permitir buscar ao apertar Enter
