<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMARKETG67 | Central de Achadinhos</title>
    <!-- Ícones Modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonte Google Inter (Usada pelas maiores startups do mundo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff5722;
            --primary-hover: #e64a19;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            /* Cores das Lojas Suavizadas e Modernas */
            --shopee: #ee4d2d;
            --amazon: #232f3e;
            --mercadolivre: #ffe600;
            --magalu: #0086ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 35px 24px;
            text-align: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Header Premium */
        .brand-wrapper {
            margin-bottom: 24px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo span {
            color: var(--primary);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }

        /* Caixa de Instrução Neo-Minimalista */
        .instruction-card {
            background-color: #f1f5f9;
            border-radius: 16px;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
            color: #334155;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .instruction-card i {
            color: var(--primary);
            background: #fff;
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Buscador Flutuante */
        .search-container {
            position: relative;
            display: flex;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 6px;
            transition: all 0.2s ease;
            margin-bottom: 32px;
        }

        .search-container:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.15);
        }

        .search-container input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            padding: 12px 16px;
            text-transform: uppercase;
        }

        .search-container input::placeholder {
            color: #94a3b8;
            font-weight: 500;
            text-transform: none;
        }

        .btn-search {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-search:hover {
            background-color: var(--primary-hover);
        }

        .btn-search:active {
            transform: scale(0.96);
        }

        /* Mensagens de feedback */
        .feedback-msg {
            font-size: 14px;
            font-weight: 600;
            margin-top: -20px;
            margin-bottom: 20px;
            display: none;
        }
        .success { color: #16a34a; }
        .error { color: #dc2626; }

        /* Divisor Elegante */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #cbd5e1;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before { margin-right: 12px; }
        .divider:not(:empty)::after { margin-left: 12px; }

        /* Grade de Botões de Curiosos (Lojas Completas) */
        .grid-stores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .store-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .store-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .store-card:active {
            transform: translateY(0) scale(0.97);
        }

        .store-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .store-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .store-badge {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Customização individual dos ícones das lojas */
        .btn-shopee .store-icon { background-color: var(--shopee); }
        .btn-amazon .store-icon { background-color: var(--amazon); }
        .btn-ml .store-icon { background-color: var(--mercadolivre); color: #111; }
        .btn-magalu .store-icon { background-color: var(--magalu); }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="brand-wrapper">
        <div class="logo"><i class="fas fa-bolt"></i> WEBMARKET<span>G67</span></div>
        <div class="subtitle">Sua Central de Achadinhos Diretos</div>
    </div>

    <!-- Instrução Direta Baseada na sua ideia -->
    <div class="instruction-card">
        <i class="fas fa-arrow-pointer"></i>
        <span>Escolha o magazine ou digite o código do post para ir direto!</span>
    </div>

    <!-- Buscador Geral -->
    <div class="search-container">
        <input type="text" id="inputCodigo" placeholder="Ex: S1, A12, M5..." autocomplete="off">
        <button class="btn-search" onclick="buscarAcao()">Buscar</button>
    </div>

    <!-- Mensagens de Erro/Sucesso integradas ao novo layout -->
    <div id="msgSucesso" class="feedback-msg success"></div>
    <div id="msgErro" class="feedback-msg error">Código não encontrado! Verifique a letra e o número.</div>

    <!-- Seção de Curiosos -->
    <div class="divider">Navegar pelas Lojas</div>

    <div class="grid-stores">
        <!-- Shopee -->
        <div class="store-card btn-shopee" onclick="abrirVitrine('shopee')">
            <div class="store-icon"><i class="fas fa-bag-shopping"></i></div>
            <div class="store-name">Shopee</div>
            <div class="store-badge">Código S...</div>
        </div>

        <!-- Amazon -->
        <div class="store-card btn-amazon" onclick="abrirVitrine('amazon')">
            <div class="store-icon"><i class="fab fa-amazon"></i></div>
            <div class="store-name">Amazon</div>
            <div class="store-badge">Código A...</div>
        </div>

        <!-- Mercado Livre -->
        <div class="store-card btn-ml" onclick="abrirVitrine('mercadolivre')">
            <div class="store-icon"><i class="fas fa-handshake"></i></div>
            <div class="store-name">Mercado Livre</div>
            <div class="store-badge">Código M...</div>
        </div>

        <!-- Magalu -->
        <div class="store-card btn-magalu" onclick="abrirVitrine('magalu')">
            <div class="store-icon"><i class="fas fa-shopping-cart"></i></div>
            <div class="store-name">Magalu</div>
            <div class="store-badge">Código G...</div>
        </div>
    </div>
</div>

<script>
    // 1. BANCO DE DADOS ATUALIZADO COM SEUS LINKS REAIS DA SHOPEE (S1 até S44)

        // --- EXEMPLOS PARA OUTRAS LOJAS (Basta alimentar quando tiver os links) ---
        "A1": "https://amazon.com.br/link-da-amazon",
        "M1": "https://mercadolivre.com/link-do-mercado-livre",
        "G1": "https://magazineluiza.com.br/link-da-magalu"
    };

    // 2. LINKS DAS SUAS VITRINES COMPLETAS (Para os usuários curiosos que clicam nos botões)
    function abrirVitrine(loja) {
        const vitrines = {
            'shopee': 'https://shope.ee/SUA_VITRINE_COMPLETA_AQUI',
            'amazon': 'https://www.amazon.com.br/shop/SEU_USER_AQUI',
            'mercadolivre': 'https://perfil.mercadolivre.com.br/SEU_USER_AQUI',
            'magalu': 'https://www.magazinevoce.com.br/magazineSEUUSER/'
        };
        window.location.href = vitrines[loja];
    }

    // Ação do Botão Buscar Geral
    function buscarAcao() {
        const valorInput = document.getElementById('inputCodigo').value.trim().toUpperCase();
        const msgErro = document.getElementById('msgErro');
        const msgSucesso = document.getElementById('msgSucesso');

        if (valorInput === "") {
            msgSucesso.style.display = "none";
            msgErro.innerText = "Por favor, digite o código do post!";
            msgErro.style.display = "block";
            return;
        }

        if (linksProdutos[valorInput]) {
            msgErro.style.display = "none";
            msgSucesso.innerText = "Redirecionando para a loja... 🛍️";
            msgSucesso.style.display = "block";
            
            setTimeout(function() {
                window.location.href = linksProdutos[valorInput];
            }, 600);
        } else {
            msgSucesso.style.display = "none";
            msgErro.innerText = "Código não encontrado! Lembre-se de usar a letra (Ex: S1, A5...)";
            msgErro.style.display = "block";
        }
    }

    // Ativar busca automática ao apertar "Enter" no teclado
    document.getElementById('inputCodigo').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            buscarAcao();
        }
    });
</script>

</body>
</html>
