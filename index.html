            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.15);
        }

        .search-container input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            padding: 12px 16px;
            text-transform: uppercase;
        }

        .search-container input::placeholder {
            color: #94a3b8;
            font-weight: 500;
            text-transform: none;
        }

        .btn-search {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-search:hover {
            background-color: var(--primary-hover);
        }

        /* Mensagens de feedback */
        .feedback-msg {
            font-size: 14px;
            font-weight: 600;
            margin-top: -20px;
            margin-bottom: 25px;
            display: none;

            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(238, 77, 45, 0.2);
            transition: background 0.2s;
        }

            background: #d73a1e;
        }
    </style>
</head>

    function buscarAcao() {
        const valorInput = document.getElementById('inputCodigo').value.trim().toUpperCase();
        const msgErro = document.getElementById('msgErro');
        const msgSucesso = document.getElementById('msgSucesso');

        if (valorInput === "") {
            msgSucesso.style.display = "none";
            msgErro.innerText = "Por favor, digite o código do post!";
            msgErro.style.display = "block";
            return;
        }

        if (linksProdutos[valorInput]) {
            msgErro.style.display = "none";
            msgSucesso.innerText = "Redirecionando para a loja... 🛍️";
            msgSucesso.style.display = "block";
            
            setTimeout(function() {
                const novaAba = window.open(linksProdutos[valorInput], '_blank');
                if (novaAba) { novaAba.focus(); } else { window.location.href = linksProdutos[valorInput]; }
            }, 600);
        } else {
            msgSucesso.style.display = "none";
            msgErro.style.display = "block";
        }
    }

    document.getElementById('inputCodigo').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { buscarAcao(); }
    });
